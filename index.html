<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Project Sign Up Form</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&family=Michroma&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

  <main>

    <section id="logo-container">

      <div id="logo-section">
        <img src="./images/unsplash.avif" alt="BG for Odin Project" id="side-bar-bg"/>
        
        <div id="odin-banner">

          <img src='./images/odin-lined.png' alt="Logo for Odin Project" id="odin-project-logo">
          <p>ODIN</p>

        </div>
      
      </div>

      <div id="credit-section">
        <p>Credit Placeholder Unsplash</p>
      </div>

    </section>

    <section id="body-wrapper">

      <header id="header"> 

        <p>This is not a real online service!
        You know you need something like this in
        your life to help you realise your deepest dreams.
        Sign up now to get Started.</p>

        <p>You <span>Know</span> You Want to.</p>


      </header>

      <section id="cta">
        <h1>Let's do this</h1>
      <div id="body-form">
  
        <form action="/submit-endpoint" method="POST" id="signup-form">
          <div class="form-wrap">
        <label for="first_name">FIRST NAME</label>
        <input id="first_name" name="first_name" type="text" pattern="[A-Za-z]+"required>
        </div>
      
          <div class="form-wrap">
        <label for="last_name">LAST NAME</label>
        <input id="last_name" name="last_name" type="text" required>
      </div>
      
      <div class="form-wrap">
        <label for="email">EMAIL</label>
        <input id="email" name="email" type="email" required>
      </div>
      <div class="form-wrap">
        <label for="phone">PHONE NUMBER</label>
        <input id="phone" name="phone" type="tel" pattern="0[0-9]{1,3}[ ]?[0-9]{3,4}[ ]?[0-9]{3,4}"required>
      </div>
      
      <div class="form-wrap">
        <label for="password">PASSWORD</label>
        <input id="password" name="password" type="password" required min-length="8">
      </div>
      
      <div class="form-wrap">
        <label for="password_conf">CONFIRM PASSWORD</label>
        <input id="password_conf" name="password_conf" type="password" required>
      </div>
        </form>

      </div>

      </section>

      <div id="cta-end">

    <button type="submit" form="signup-form">Create Account</button>

    <a>Already made an Account? <em>Log in</em></a>
      
      </div>

    </section>




  </main>

  
</body>
</html>
        </form>

      </div>



    </section>



  </main>

  
</body>
</html>
