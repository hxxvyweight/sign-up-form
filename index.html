<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Project Sign Up Form</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Merienda:wght@300..900&family=Michroma&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

  <main>

    <section id="logo-container">

      <div id="logo-section">
        <img src="../images/unsplash.avif" alt="Logo for Odin Project"/>
        
        <div id="odin-banner">

          <p>place</p>

        </div>
      
      </div>

      <div id="credit-section">
        <p>Credit Placeholder Unsplash</p>
      </div>

    </section>

    <section id="body-wrapper">

      <header id="header"> 

        <p>This is not a real online service!
        You know you need something like this in
        your life to help you realise your deepest dreams.
        Sign up now to get Started.</p>

        <p>You <span>Know</span> You Want to.</p>


      </header>

      <div id="body-form">

        <form>
          <label for="first_name" name="first_name">First Name</label>
          <input id="first_name" type="text"></input>
          
          <label for="last_name" name="last_name">Last Name</label>
          <input id="last_name" type="text"></input>
        </form>

      </div>



    </section>



  </main>

  
</body>
</html>
